<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Game</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            --tile-empty: #ffffff;
            --tile-border: #d3d6da;
            --text-main: #4a4a4a;
            --correct: #b8e0c9; /* Soft Pastel Green */
            --present: #f7e39c; /* Soft Pastel Yellow */
            --absent: #cbd5e0;  /* Soft Pastel Grey */
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            color: var(--text-main);
        }

        header {
            margin-top: 30px;
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 800;
            background: linear-gradient(to right, #8e9eab, #eef2f3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.1));
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 8px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .tile {
            width: 58px;
            height: 58px;
            border: 2px solid var(--tile-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            background-color: var(--tile-empty);
            box-shadow: var(--shadow);
            transition: transform 0.1s ease;
        }

        .tile.pop {
            transform: scale(1.1);
            border-color: #999;
        }

        .tile.flip {
            animation: flip 0.6s ease forwards;
        }

        @keyframes flip {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        input {
            padding: 12px;
            width: 150px;
            border: none;
            border-radius: 25px;
            outline: none;
            text-align: center;
            font-size: 1rem;
            letter-spacing: 2px;
            box-shadow: var(--shadow);
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background-color: #ffffff;
            color: var(--text-main);
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            background-color: #fafafa;
        }

        .message {
            height: 30px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Wordle Game</h1>
    </header>

    <div id="game-container">
        <div id="board"></div>
        
        <div class="message" id="message"></div>

        <div class="input-area">
            <input type="text" id="guessInput" maxlength="5" placeholder="GUESS" autocomplete="off">
            <button onclick="submitGuess()">ENTER</button>
        </div>
    </div>

    <script>
        const targetWord = "PEACH"; // You can change this to any 5-letter word
        let attempts = 0;
        const maxAttempts = 6;

        // Create the board
        const board = document.getElementById('board');
        for (let i = 0; i < maxAttempts; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                row.appendChild(tile);
            }
            board.appendChild(row);
        }

        function submitGuess() {
            const input = document.getElementById('guessInput');
            const guess = input.value.toUpperCase();
            const message = document.getElementById('message');

            if (guess.length !== 5) {
                message.textContent = "Not enough letters!";
                return;
            }

            if (attempts >= maxAttempts) return;

            const row = board.children[attempts];
            const tiles = row.children;

            // Simple logic for coloring
            for (let i = 0; i < 5; i++) {
                const char = guess[i];
                setTimeout(() => {
                    tiles[i].textContent = char;
                    tiles[i].classList.add('flip');
                    
                    if (char === targetWord[i]) {
                        tiles[i].style.backgroundColor = 'var(--correct)';
                        tiles[i].style.borderColor = 'var(--correct)';
                    } else if (targetWord.includes(char)) {
                        tiles[i].style.backgroundColor = 'var(--present)';
                        tiles[i].style.borderColor = 'var(--present)';
                    } else {
                        tiles[i].style.backgroundColor = 'var(--absent)';
                        tiles[i].style.borderColor = 'var(--absent)';
                    }
                    tiles[i].style.color = "white";
                }, i * 100); 
            }

            if (guess === targetWord) {
                setTimeout(() => message.textContent = "✨ Magnificent! ✨", 600);
                input.disabled = true;
            } else {
                attempts++;
                if (attempts === maxAttempts) {
                    setTimeout(() => message.textContent = "Game Over. It was " + targetWord, 600);
                }
            }

            input.value = '';
        }

        // Allow 'Enter' key to submit
        document.getElementById('guessInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                submitGuess();
            }
        });
    </script>
</body>
</html>
